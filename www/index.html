<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Zen Wallpapers</title>
    <style>
        :root {
            --bg: #0c0a09;
            --accent: #d97706;
            --text: #a8a29e;
            --white: #fafaf9;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bottom);
            min-height: 100vh;
            overflow-x: hidden;
        }
        header {
            padding: 20px 16px;
            text-align: center;
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 100;
            border-bottom: 1px solid #1c1917;
        }
        .logo {
            font-size: 20px;
            letter-spacing: 8px;
            color: var(--white);
            font-weight: 300;
            margin-bottom: 12px;
        }
        .categories {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 8px 0;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .categories::-webkit-scrollbar { display: none; }
        .cat-btn {
            background: #1c1917;
            border: 1px solid #292524;
            color: var(--text);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }
        .cat-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 16px;
        }
        .card {
            background: #1c1917;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 9 / 16;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .card:active { transform: scale(0.98); }
        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .card-score {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0,0,0,0.7);
            color: var(--accent);
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: bold;
        }
        
        /* Fullscreen Preview */
        .preview-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #000;
            z-index: 200;
            display: none;
            flex-direction: column;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .preview-overlay.active { display: flex; }
        .preview-image {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            overflow: hidden;
        }
        .preview-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }
        .preview-image img.zoomed {
            object-fit: contain;
        }
        .preview-actions {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            padding-bottom: calc(20px + var(--safe-bottom));
            display: flex;
            gap: 12px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
        }
        .action-btn {
            flex: 1;
            padding: 16px;
            border-radius: 12px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .action-btn.primary {
            background: var(--accent);
            color: white;
        }
        .action-btn.primary:disabled {
            background: #666;
            cursor: not-allowed;
        }
        .action-btn.secondary {
            background: rgba(255,255,255,0.15);
            color: var(--white);
            backdrop-filter: blur(10px);
        }
        .close-btn {
            position: absolute;
            top: calc(16px + var(--safe-top));
            left: 16px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            z-index: 10;
        }
        .zoom-btn {
            position: absolute;
            top: calc(16px + var(--safe-top));
            right: 16px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            z-index: 10;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text);
        }
        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid #1c1917;
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: calc(100px + var(--safe-bottom));
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1c1917;
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            z-index: 300;
            transition: transform 0.3s;
            border: 1px solid var(--accent);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <header>
        <div class="logo">ZEN WALLPAPERS</div>
        <div class="categories" id="categories">
            <button class="cat-btn active" data-cat="all">All</button>
            <button class="cat-btn" data-cat="nature">Nature</button>
            <button class="cat-btn" data-cat="minimal">Minimal</button>
            <button class="cat-btn" data-cat="abstract">Abstract</button>
            <button class="cat-btn" data-cat="dark">Dark</button>
        </div>
    </header>

    <div id="loading" class="loading">
        <div class="spinner"></div>
        <div>Loading wallpapers...</div>
    </div>
    
    <div class="grid" id="imageGrid"></div>

    <!-- Fullscreen Preview -->
    <div class="preview-overlay" id="preview">
        <button class="close-btn" onclick="closePreview()">←</button>
        <button class="zoom-btn" onclick="toggleZoom()">⤢</button>
        <div class="preview-image" onclick="toggleZoom()">
            <img id="previewImg" src="" alt="Preview">
        </div>
        <div class="preview-actions">
            <button class="action-btn secondary" onclick="downloadWallpaper()">💾 Save</button>
            <button class="action-btn primary" id="setWallpaperBtn" onclick="setWallpaper()">🖼️ Set Wallpaper</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let wallpapers = [];
        let currentWallpaper = null;
        let currentCategory = 'all';

        // Load wallpapers from JSON
        async function loadWallpapers() {
            try {
                const response = await fetch('s-grade-curated.json');
                wallpapers = await response.json();
                renderWallpapers();
            } catch (err) {
                console.error('Failed to load wallpapers:', err);
                document.getElementById('loading').innerHTML = 'Failed to load wallpapers';
            }
        }

        function renderWallpapers() {
            const grid = document.getElementById('imageGrid');
            const loading = document.getElementById('loading');
            loading.style.display = 'none';
            
            let filtered = wallpapers;
            if (currentCategory !== 'all') {
                filtered = wallpapers.filter(w => {
                    const reason = (w.reason || '').toLowerCase();
                    return reason.includes(currentCategory);
                });
            }
            
            // Shuffle for variety
            filtered = filtered.sort(() => Math.random() - 0.5);
            
            grid.innerHTML = filtered.map((w, i) => `
                <div class="card" onclick="openPreview(${i})">
                    <img src="${w.url}" alt="Wallpaper" loading="lazy">
                    <div class="card-score">★ ${w.score}</div>
                </div>
            `).join('');
        }

        function openPreview(index) {
            const filtered = currentCategory === 'all' ? wallpapers : 
                wallpapers.filter(w => (w.reason || '').toLowerCase().includes(currentCategory));
            currentWallpaper = filtered[index];
            
            document.getElementById('previewImg').src = currentWallpaper.url;
            document.getElementById('preview').classList.add('active');
        }

        function closePreview() {
            document.getElementById('preview').classList.remove('active');
            document.getElementById('previewImg').classList.remove('zoomed');
        }

        function toggleZoom() {
            document.getElementById('previewImg').classList.toggle('zoomed');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        async function downloadWallpaper() {
            if (!currentWallpaper) return;
            
            try {
                // For Android, we'll use the Capacitor Filesystem plugin
                if (window.Capacitor) {
                    showToast('Saving to gallery...');
                    // This would use native plugin - simplified for now
                    const link = document.createElement('a');
                    link.href = currentWallpaper.url;
                    link.download = `zen-wallpaper-${currentWallpaper.id}.jpg`;
                    link.click();
                    showToast('Saved to Downloads!');
                } else {
                    const link = document.createElement('a');
                    link.href = currentWallpaper.url;
                    link.download = `zen-wallpaper-${currentWallpaper.id}.jpg`;
                    link.click();
                    showToast('Download started!');
                }
            } catch (err) {
                showToast('Download failed');
            }
        }

        async function setWallpaper() {
            if (!currentWallpaper) return;
            
            showToast('Setting wallpaper...');
            
            // Check if running in Capacitor (Android app)
            if (window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform()) {
                try {
                    const { WallpaperPlugin } = window.Capacitor.Plugins;
                    if (WallpaperPlugin) {
                        await WallpaperPlugin.setWallpaper({
                            url: currentWallpaper.url
                        });
                        showToast('✓ Wallpaper set!');
                        setTimeout(() => closePreview(), 500);
                    } else {
                        throw new Error('Plugin not available');
                    }
                } catch (err) {
                    console.error('Wallpaper error:', err);
                    showToast('Failed: ' + (err.message || 'Unknown error'));
                }
            } else {
                // Web fallback: download the image
                showToast('Downloading image...');
                try {
                    const response = await fetch(currentWallpaper.url);
                    const blob = await response.blob();
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `zen-wallpaper-${currentWallpaper.id || Date.now()}.jpg`;
                    a.click();
                    URL.revokeObjectURL(url);
                    showToast('Downloaded! Set manually in gallery.');
                } catch (err) {
                    showToast('Download failed');
                }
            }
        }

        // Category buttons
        document.getElementById('categories').addEventListener('click', (e) => {
            if (e.target.classList.contains('cat-btn')) {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentCategory = e.target.dataset.cat;
                renderWallpapers();
            }
        });

        // Initialize
        loadWallpapers();
    </script>
</body>
</html>
